name: CI

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]

jobs:
  lint-and-test:
    name: Lint & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
      - run: npm install --no-audit
      - run: npm run typecheck
      - run: npm test

  detect-changes:
    name: Detect Source Changes
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest
    outputs:
      source_changed: ${{ steps.filter.outputs.source }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            source:
              - 'src/**'
              - 'app.json'
              - 'metro.config.js'
              - 'babel.config.js'
              - 'eas.json'
              - 'package.json'
              - 'package-lock.json'
              - 'tsconfig.json'

  build-android:
    name: Build Android APK (Release)
    needs: [lint-and-test, detect-changes]
    if: needs.detect-changes.outputs.source_changed == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
      - run: npm install --no-audit
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
      - name: Cache Gradle deps
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-v1-${{ runner.os }}-${{ hashFiles('package.json') }}
          restore-keys: gradle-v1-${{ runner.os }}-
      - name: Cache Expo prebuild (android/)
        uses: actions/cache@v4
        with:
          path: android/
          key: prebuild-v1-${{ runner.os }}-${{ hashFiles('app.json', 'metro.config.js', 'babel.config.js') }}
          restore-keys: prebuild-v1-${{ runner.os }}-
      - name: Cache Metro bundler
        uses: actions/cache@v4
        with:
          path: node_modules/.cache
          key: metro-v1-${{ runner.os }}-${{ hashFiles('src/**/*') }}
          restore-keys: metro-v1-${{ runner.os }}-
      - name: Generate native Android project
        run: npx expo prebuild --platform android --no-install
      - name: Configure release to use debug signing
        run: |
          if ! grep -q 'signingConfig signingConfigs.debug' android/app/build.gradle; then
            sed -i '/release {/a\            signingConfig signingConfigs.debug' android/app/build.gradle
          fi
      - name: Bundle JS into APK
        run: |
          npx expo export:embed \
            --platform android \
            --dev false \
            --entry-file node_modules/expo-router/entry.js \
            --bundle-output android/app/src/main/assets/index.android.bundle \
            --assets-dest android/app/src/main/res
      - name: Build Release APK
        run: cd android && ./gradlew assembleRelease
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: wealth-manager-release-apk
          path: android/app/build/outputs/apk/release/app-release.apk
