name: CI

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]

jobs:
  lint-and-test:
    name: Lint & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
      - run: npm install --no-audit
      - run: npm run typecheck
      - run: npm test

  build-android:
    name: Build Android APK (Release)
    needs: [lint-and-test]
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
      - run: npm install --no-audit
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: gradle-${{ runner.os }}-
      - name: Cache Expo prebuild
        uses: actions/cache@v4
        with:
          path: android/
          key: prebuild-${{ runner.os }}-${{ hashFiles('app.json', 'package.json', 'metro.config.js', 'babel.config.js', 'tsconfig.json') }}
          restore-keys: prebuild-${{ runner.os }}-
      - name: Generate native Android project
        run: npx expo prebuild --platform android --no-install
      - name: Configure release to use debug signing
        run: |
          if ! grep -q 'signingConfig signingConfigs.debug' android/app/build.gradle; then
            sed -i '/release {/a\            signingConfig signingConfigs.debug' android/app/build.gradle
          fi
      - name: Bundle JS into APK
        run: |
          npx expo export:embed \
            --platform android \
            --dev false \
            --entry-file node_modules/expo-router/entry.js \
            --bundle-output android/app/src/main/assets/index.android.bundle \
            --assets-dest android/app/src/main/res
      - name: Build Release APK
        run: cd android && ./gradlew assembleRelease
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: wealth-manager-release-apk
          path: android/app/build/outputs/apk/release/app-release.apk
