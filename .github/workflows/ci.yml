name: CI

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]

jobs:
  lint-typecheck:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm install
      - run: npm run typecheck

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm install
      - run: npm test

  # EAS Build jobs require EXPO_TOKEN secret to be set in GitHub Settings
  # To enable: create an Expo access token at https://expo.dev/settings/access-tokens
  # then add it as EXPO_TOKEN in GitHub repo Settings → Secrets and Variables → Actions
  build-android:
    name: Build Android (EAS)
    needs: [lint-typecheck, test]
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm install
      - run: npm install -g eas-cli
      - name: Build Android Preview
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        run: |
          if [ -z "$EXPO_TOKEN" ]; then
            echo "EXPO_TOKEN not set — skipping build. Configure at repo Settings → Secrets."
            exit 0
          fi
          eas build --platform android --profile preview --non-interactive

  build-ios:
    name: Build iOS (EAS)
    needs: [lint-typecheck, test]
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm install
      - run: npm install -g eas-cli
      - name: Build iOS Preview
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        run: |
          if [ -z "$EXPO_TOKEN" ]; then
            echo "EXPO_TOKEN not set — skipping build. Configure at repo Settings → Secrets."
            exit 0
          fi
          eas build --platform ios --profile preview --non-interactive
